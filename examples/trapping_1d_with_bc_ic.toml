[mesh.main]
type = "uniform_1d"
xmin = 0.0
xmax = 1.0
nx = 101

[backend.main]
type = "trapping_1d"
k_trap = 5.0
k_detrap = 0.5
diffusion_coefficient = 0.01
mobile_species = "H_mobile"
trapped_species = "H_trapped"

[ic.mobile]
# Species-targeted IC syntax.
type = "uniform_species"
species = "H_mobile"
value = 0.05

[ic.trapped]
type = "uniform_species"
species = "H_trapped"
value = 0.10

[bc.left_H]
# Explicit TOML BC syntax currently supports only dirichlet conditions.
# If no [bc.*] blocks are provided, the default behaviour is implicit
# zero-flux Neumann / closed-boundary behaviour from the diffusion operator.
type = "dirichlet"
species = "H_mobile"
boundary = "left"
value = 0.0
method = "weak"

[bc.right_H]
type = "dirichlet"
species = "H_mobile"
boundary = "right"
value = 0.0
method = "weak"

[output.fields]
type = "hdf5"
file = "trapping_fields.h5"
xdmf = true

[problem.run]
# Supported problem block types currently include:
#   - simulation
#   - diffusion_1d
#   - trapping_1d
#   - hotgates_trapping
#
# These all assemble through the same registered problem builder; the backend
# still defines the actual species/state layout.
type = "simulation"
mesh = "main"
backend = "main"
ics = ["mobile", "trapped"]
bcs = ["left_H", "right_H"]
outputs = ["fields"]
tspan = [0.0, 1.0]

# Supported formulations:
#   - unsplit
#   - imex
#   - imex_reaction
#   - split
#   - residual
formulation = "unsplit"

# Common algorithm choices:
#   - Rodas5
#   - Rodas5P
#   - KenCarp4
#   - CVODE_BDF
algorithm = "Rodas5"
abstol = 1e-8
reltol = 1e-6
saveat = [0.0, 0.25, 0.5, 0.75, 1.0]
